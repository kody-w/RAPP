<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000" />
  <title>vbrainstem → grail (heimdall)</title>
  <link rel="canonical" href="https://kody-w.github.io/heimdall/" />
  <style>
    body { background: #000; color: #fff; font: 15px/1.55 -apple-system, system-ui, sans-serif;
      margin: 0; padding: 60px 20px; text-align: center; }
    a { color: #58a6ff; }
    h1 { font-weight: 600; font-size: 18px; }
    code { background: #161b22; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>vbrainstem IS heimdall's index.html now (the grail)</h1>
  <p>Per the operator: stop rebuilding this thing — heimdall is the canonical browser brainstem.</p>
  <p>Redirecting to <span id="dest">…</span></p>
  <p style="margin-top: 30px;"><a id="manual" href="/RAPP/pages/summon.html">Tap a twin in the summon portal →</a></p>

  <script>
    // The grail browser brainstem is heimdall's index.html. It supports
    // embodying ANY planted twin via ?seed=<owner>/<repo>. We point all
    // canonical vbrainstem URLs at it instead of duplicating the file.
    //
    // Behavior:
    //   - If localStorage.vbs_rappid is a v2 rappid: extract owner/repo,
    //     redirect to heimdall/?seed=owner/repo (auto-embody)
    //   - Otherwise: redirect to summon portal so the user picks a twin
    const GRAIL = "https://kody-w.github.io/heimdall/";
    const rappid = localStorage.getItem("vbs_rappid") || "";
    // Eternity rappid:@<owner>/<slug>:<hash> (legacy v2 prefix optional, read-compat)
    const m = /^rappid:(?:v2:[^:]+:)?@([^/]+)\/([^:]+):/.exec(rappid);
    if (m) {
      const dest = `${GRAIL}?seed=${encodeURIComponent(m[1] + "/" + m[2])}`;
      document.getElementById("dest").innerHTML = `<a href="${dest}">${dest}</a>`;
      setTimeout(() => location.replace(dest), 700);
    } else {
      // Allow direct heimdall (no embodied seed) for the operator's own brainstem
      const params = new URLSearchParams(location.search);
      if (params.get("seed")) {
        const dest = GRAIL + "?seed=" + encodeURIComponent(params.get("seed"));
        document.getElementById("dest").innerHTML = `<a href="${dest}">${dest}</a>`;
        setTimeout(() => location.replace(dest), 600);
      } else {
        document.getElementById("dest").innerHTML = `<a href="/RAPP/pages/summon.html">summon portal</a>`;
        setTimeout(() => location.replace("/RAPP/pages/summon.html"), 1500);
      }
    }
  </script>
</body>
</html>
