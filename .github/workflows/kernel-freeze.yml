name: kernel-freeze
# rapp-distro/1.0 — prove the distro ships an UNMODIFIED kernel (pin, don't fork).
on: [push, pull_request, workflow_dispatch]
jobs:
  freeze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Verify the frozen kernel set == grail @ pinned tag
        run: python3 check_kernel_pin.py
